#
# Example Nginx reverse proxy for jira-relay
#
# - Public HTTPS terminates at ALB (recommended), then ALB forwards to this host:80
# - Nginx listens on 80 and forwards to jira-relay on 127.0.0.1:8080
#

server {
  listen 80;
  server_name _;

  # Health endpoint (optional direct forward)
  location = /healthz {
    proxy_pass http://127.0.0.1:8080/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Jira webhook receiver
  location = /jira/events {
    proxy_pass http://127.0.0.1:8080/jira/events;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

